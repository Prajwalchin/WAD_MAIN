<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>
    <style>
        body {
            font-family: Times, serif;
            background-color: #ffe5d9; /* The pale outer background color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-container {
            border: 2px solid #a3a3a3;
            background-color: #f7f7f7;
            padding: 2px;
            width: 480px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            border: 1px solid black;
        }

        tr, td {
            border: 1px solid #7a7a7a;
            padding: 0;
            vertical-align: top;
        }

        .cyan-bg {
            background-color: #00dfff; /* The bright cyan background */
            color: black;
            font-weight: normal;
        }

        /* Styling for the first 'User Form' row */
        .header-row {
            background-color: #ffffcc; /* Pale yellow */
            text-align: center;
            height: 40px;
        }

        .header-text {
            color: red;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

        /* Label columns */
        .label-col {
            width: 150px;
            padding: 8px;
        }

        /* Input columns */
        .input-col {
            padding: 4px;
        }

        /* Inputs and Textareas */
        input[type="text"], input[type="password"], textarea, select {
            width: 95%;
            padding: 4px;
            border: 1px solid #7a7a7a;
            box-sizing: border-box; /* To keep width accurate with padding */
        }

        textarea {
            height: 70px;
            resize: none;
        }

        /* Checkbox and Radio styling */
        .check-radio-group {
            margin: 5px 0;
        }

        .checkbox-row, .radio-row {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
            padding-left: 2px;
        }

        input[type="checkbox"], input[type="radio"] {
            margin-right: 8px;
        }

        /* Gender specific layout */
        .gender-container {
            display: flex;
            align-items: center;
            padding-left: 5px;
            height: 30px; /* Adjust to align with label row */
        }

        /* File Upload */
        .file-upload-row {
            padding: 8px;
            text-align: left;
            display: flex;
            align-items: center;
        }

        /* Footer buttons */
        .button-row {
            padding: 10px;
            text-align: center;
            display: flex;
            justify-content: space-evenly;
        }

        input[type="button"], input[type="reset"], input[type="submit"] {
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
            background-color: #f1f1f1;
            border: 1px solid #a3a3a3;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <form action="#" method="post">
            <table>
                <tr class="header-row">
                    <td colspan="2"><h1 class="header-text">User Form</h1></td>
                </tr>

                <tr>
                    <td class="label-col cyan-bg">Enter Name</td>
                    <td class="input-col"><input type="text" name="userName"></td>
                </tr>

                <tr>
                    <td class="label-col cyan-bg">Enter Password</td>
                    <td class="input-col"><input type="password" name="userPass"></td>
                </tr>

                <tr>
                    <td class="label-col cyan-bg">Enter Address</td>
                    <td class="input-col"><textarea name="userAddress"></textarea></td>
                </tr>

                <tr>
                    <td class="label-col cyan-bg">Select Game</td>
                    <td class="input-col check-radio-group">
                        <div class="checkbox-row"><input type="checkbox" name="game[]" value="hockey"> Hockey</div>
                        <div class="checkbox-row"><input type="checkbox" name="game[]" value="football"> Football</div>
                        <div class="checkbox-row"><input type="checkbox" name="game[]" value="badminton"> Badminton</div>
                        <div class="checkbox-row"><input type="checkbox" name="game[]" value="cricket"> Cricket</div>
                        <div class="checkbox-row"><input type="checkbox" name="game[]" value="volleyball"> volleyball</div>
                    </td>
                </tr>

                <tr>
                    <td class="label-col cyan-bg">Gender</td>
                    <td class="input-col cyan-bg">
                        <div class="gender-container">
                            <input type="radio" name="gender" value="male"> Male
                            <input type="radio" name="gender" value="female" style="margin-left: 15px;"> Female
                        </div>
                    </td>
                </tr>

                <tr>
                    <td class="label-col cyan-bg">Select ur age</td>
                    <td class="input-col">
                        <select name="userAge">
                            <option value="">Select</option>
                            <option value="under18">Under 18</option>
                            <option value="18-25">18-25</option>
                            <option value="26-35">26-35</option>
                            <option value="over35">Over 35</option>
                        </select>
                    </td>
                </tr>

                <tr class="cyan-bg">
                    <td colspan="2" class="file-upload-row">
                        <input type="file" name="userFile">
                    </td>
                </tr>

                <tr class="cyan-bg">
                    <td colspan="2" class="button-row">
                        <input type="button" value="Click Me">
                        <input type="reset" value="Reset">
                        <input type="submit" value="Submit Form">
                    </td>
                </tr>

            </table>
        </form>
    </div>

</body>
</html>
