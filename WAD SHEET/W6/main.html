<!DOCTYPE html>
<html>
<head>
    <title>W6 Tables</title>

    <style>
        table, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
            text-align: center;
        }
        .same {
            background-color: lightblue;
        }
    </style>
</head>

<body>

<h3>Enter Inputs (e.g. 3#3#3)</h3>

<input id="input1" placeholder="First Input">
<input id="input2" placeholder="Second Input">
<button onclick="generate()">Generate</button>

<h3>Table 1</h3>
<div id="t1"></div>

<h3>Table 2</h3>
<div id="t2"></div>

<h3>Table 3</h3>
<div id="t3"></div>

<script>

function createTable(rows, cols, start) {
    let table = [];
    let num = start;

    for (let i = 0; i < rows; i++) {
        let row = [];
        let temp = num;
        for (let j = 0; j < cols; j++) {
            row.push(temp);
            temp += start;
        }
        table.push(row);
        num += start;
    }
    return table;
}

function renderTable(data, highlight = []) {
    let html = "<table>";

    data.forEach(row => {
        html += "<tr>";
        row.forEach(cell => {
            let cls = highlight.includes(cell) ? "same" : "";
            html += `<td class="${cls}">${cell}</td>`;
        });
        html += "</tr>";
    });

    html += "</table>";
    return html;
}

function generate() {

    let i1 = document.getElementById("input1").value.split("#");
    let i2 = document.getElementById("input2").value.split("#");

    let r1 = +i1[0], c1 = +i1[1], s1 = +i1[2];
    let r2 = +i2[0], c2 = +i2[1], s2 = +i2[2];

    let t1 = createTable(r1, c1, s1);
    let t2 = createTable(r2, c2, s2);

    document.getElementById("t1").innerHTML = renderTable(t1);
    document.getElementById("t2").innerHTML = renderTable(t2);

    // TABLE 3
    if (r1 === r2 && c1 === c2) {

        let t3 = [];

        for (let i = 0; i < r1; i++) {
            let row = [];
            for (let j = 0; j < c1; j++) {

                if (t1[0][0] === t2[0][0]) {
                    row.push(t1[i][j]);
                } else {
                    row.push(t1[i][j] * t2[i][j]);
                }

            }
            t3.push(row);
        }

        // find duplicates
        let flat = t3.flat();
        let duplicates = flat.filter((v, i, a) => a.indexOf(v) !== i);

        document.getElementById("t3").innerHTML = renderTable(t3, duplicates);
    }
}

</script>

</body>
</html>
