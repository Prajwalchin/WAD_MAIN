<!DOCTYPE html>
<html lang="en">
<head>
    <title> Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="regForm">
        <h2>Create Account</h2>

        <div class="field">
            <label for="uName">Full Name</label>
            <input type="text" id="uName" placeholder=" eg Paras Thakur">
            <div class="err" id="uNameE"></div>
        </div>

        <div class="field">
            <label for="mob">Mobile Number</label>
            <input type="text" id="mob" placeholder="9876543210">
            <div class="err" id="mobE"></div>
        </div>

        <div class="field">
            <label for="email">Email Address</label>
            <input type="text" id="email" placeholder="name@mail.com">
            <div class="err" id="emailE"></div>
        </div>

<div class="field">
    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="••••••••">
    <div class="row">
        <input type="checkbox" id="showP"> <small>Show Password</small>
    </div>
    <div class="err" id="passE"></div>
</div>

        <div class="field">
            <label for="addr">Address</label>
            <textarea id="addr" placeholder="Enter your full address"></textarea>
            <div class="err" id="addrE"></div>
        </div>

        <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob">
            <div class="err" id="dobE"></div>
        </div>

        <div class="field">
            <label for="city">City</label>
            <select id="city">
                <option value="">Choose City</option>
                <option>Pune</option><option>Mumbai</option><option>Nagpur</option>
            </select>
            <div class="err" id="cityE"></div>
        </div>

        <div class="field">
            <label>Gender</label>
            <div class="row">
                <label><input type="radio" name="gen" value="Male"> Male</label>
                <label><input type="radio" name="gen" value="Female"> Female</label>
            </div>
            <div class="err" id="genE"></div>
        </div>

        <div class="field">
            <label>Hobbies</label>
            <div class="row">
                <label><input type="checkbox" class="hb" value="Dance"> Dance</label>
                <label><input type="checkbox" id="othC"> Other</label>
            </div>
            <input type="text" id="othT" style="display:none; margin-top:5px" placeholder="Specify Hobby">
            <div class="err" id="hbE"></div>
        </div>

        <button type="submit">Submit Registration</button>
    </form>
    <script src="index.js"></script>
</body>
</html>
