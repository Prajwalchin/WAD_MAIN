<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; display: grid; place-items: center; min-height: 100vh; }
    .card { background: white; padding: 25px; border-radius: 12px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; color: #333; }
    p { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 14px; }
    b { color: #666; text-transform: uppercase; font-size: 12px; }
    .tag { background: #e7f3ff; color: #007bff; padding: 2px 8px; border-radius: 10px; margin-left: 4px; }
    .btn { display: block; text-align: center; margin-top: 20px; background: #007bff; color: white; text-decoration: none; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>

<div class="card">
  <h2>User Profile</h2>
  <div id="out"></div>
  <a href="index.html" class="btn">Go Back</a>
</div>

<script>
  const d = JSON.parse(localStorage.getItem("user"));
  
  if (d) {
    // Simple one-liner string building
    document.getElementById("out").innerHTML = `
      <p><b>Name</b> ${d.name}</p>
      <p><b>Mobile</b> ${d.mobile}</p>
      <p><b>Email</b> ${d.email}</p>
      <p><b>Address</b> ${d.address}</p>
      <p><b>Birthday</b> ${d.dob}</p>
      <p><b>City</b> ${d.city}</p>
      <p><b>Gender</b> ${d.gender}</p>
      <p><b>Hobbies</b> <span>${d.hobbies.map(h => `<span class="tag">${h}</span>`).join("")}</span></p>
    `;
  } else {
    out.innerHTML = "No data found.";
  }
</script>

</body>
</html>
