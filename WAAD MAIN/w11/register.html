<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #74ebd5, #9face6);
}
.card {
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4 shadow w-100" style="max-width:500px;">

<h3 class="text-center mb-3">Registration</h3>

<form id="registerForm">

<input class="form-control mb-2" id="name" placeholder="Full Name">
<input class="form-control mb-2" id="email" placeholder="Email">
<input class="form-control mb-2" id="mobile" placeholder="Mobile">
<input type="date" class="form-control mb-2" id="dob">

<select class="form-select mb-2" id="city">
<option value="">Select City</option>
<option>Pune</option>
<option>Mumbai</option>
</select>

<textarea class="form-control mb-2" id="address" placeholder="Address"></textarea>

<button class="btn btn-primary w-100">Register</button>

</form>

<p id="msg" class="text-center mt-2 text-success"></p>

</div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = nameField.value;
    let email = emailField.value;
    let mobile = mobileField.value;
    let dob = dobField.value;
    let city = cityField.value;
    let address = addressField.value;

    if(!/^[A-Z][a-zA-Z ]*$/.test(name)) return alert("Name must start with capital");
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert("Invalid email");
    if(!/^[0-9]{10}$/.test(mobile)) return alert("Mobile must be 10 digits");
    if(city==="") return alert("Select city");

    let user = {name,email,mobile,dob,city,address};

    fetch("https://jsonplaceholder.typicode.com/posts", {
        method:"POST",
        body: JSON.stringify(user),
        headers:{ "Content-type":"application/json" }
    })
    .then(res=>res.json())
    .then(()=>{
        let users = JSON.parse(localStorage.getItem("users")) || [];
        users.push(user);
        localStorage.setItem("users", JSON.stringify(users));

        msg.innerText = "Registered Successfully!";
    });
});

const nameField = document.getElementById("name");
const emailField = document.getElementById("email");
const mobileField = document.getElementById("mobile");
const dobField = document.getElementById("dob");
const cityField = document.getElementById("city");
const addressField = document.getElementById("address");
const msg = document.getElementById("msg");
</script>

</body>
</html>
