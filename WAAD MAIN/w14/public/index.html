<!DOCTYPE html>
<html>
<head>
<title>User List</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

table {
  margin: auto;
  border-collapse: collapse;
  width: 60%;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
}

th {
  background: #007bff;
  color: white;
}
</style>

</head>

<body>

<h2>User List</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>

<script>
fetch('http://localhost:3000/api/users')
  .then(res => res.json())
  .then(data => {
    let table = document.getElementById("userTable");

    data.forEach(user => {
      table.innerHTML += `
        <tr>
          <td>${user.id}</td>
          <td>${user.name}</td>
          <td>${user.email}</td>
        </tr>
      `;
    });
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
